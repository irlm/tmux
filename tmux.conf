# ─── Prefix ───────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── General ──────────────────────────────────────────────
set -g mouse on
set -g focus-events on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g repeat-time 300
set -g display-panes-time 2000            # C-a q: 2s to pick a pane number
set -g word-separators " -_@/=."          # smarter double-click word selection
set -g detach-on-destroy off          # switch to next session instead of detaching
set -g set-clipboard on               # use system clipboard via OSC 52

# ─── True color & undercurl support ───────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ─── Cursor passthrough ─────────────────────────────────
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g cursor-style blinking-block

# ─── Vi mode & copy ──────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi / command-prompt -ip '(search down)' 'send -X search-forward "%%%"'
bind -T copy-mode-vi ? command-prompt -ip '(search up)' 'send -X search-backward "%%%"'

# ─── Pane navigation (vim-style) ─────────────────────────
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ─── Pane resizing (repeatable) ──────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Intuitive splits (open in current path) ─────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Quick actions ────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind x if-shell '[ "#{window_panes}" -gt 1 ]' kill-pane 'confirm-before -p "Last pane — kill window? (y/n)" kill-pane'
bind X kill-window
bind S choose-session
bind W choose-window
bind Q confirm-before -p "Kill ALL sessions? (y/n)" kill-server
# bind C-s / C-r available if resurrect is re-enabled
bind D choose-client -Z                   # pick which client to detach
bind C-l clear-history \; display "History cleared"
bind T clock-mode

# ─── Popup terminals ─────────────────────────────────────
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"
bind G display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "gh dash"
bind f display-popup -d "#{pane_current_path}" -w 80% -h 80% -E
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "btop"
bind d display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazydocker"
bind i display-popup -w 60% -h 50% -E "fastfetch --pipe false | less -R"
bind '?' display-popup -w 82 -h 42 -E "bash -c 'less -KRc ~/.config/tmux/cheatsheet.txt'"
bind n display-popup -d "#{pane_current_path}" -w 70% -h 70% -E "~/.config/tmux/scripts/notes.sh"
bind '/' display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux capture-pane -pS -10000 | fzf --tac --no-sort"
bind o display-popup -w 70% -h 70% -E "~/.config/tmux/scripts/sessionizer.sh"

# ─── Session management ──────────────────────────────────
bind N command-prompt -p "New session:" "new-session -s '%%'"
bind . command-prompt -p "Rename session:" "rename-session '%%'"
bind , command-prompt -p "Rename window:" "rename-window '%%'"
bind C-n setw automatic-rename on \; display "Auto-rename ON"
bind BSpace switch-client -l   # toggle last session

# ─── Swap panes / windows ────────────────────────────────
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1
bind -r '{' swap-pane -U
bind -r '}' swap-pane -D
bind z resize-pane -Z          # toggle zoom (built-in, explicit for docs)
bind b break-pane              # break pane into its own window
bind @ join-pane -h            # pull last pane into current window
bind m select-pane -m          # mark pane (for join-pane target)
bind Y setw synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# ─── Nested tmux (SSH) toggle ─────────────────────────────
# F12 disables local prefix so all keys pass to the inner (remote) tmux.
# Press F12 again to re-enable local prefix.
# Visual indicator: status bar changes when "off" (inner mode).
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-left '#[bg=colour1,fg=colour15,bold]  REMOTE #[default] ' \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-left \;\
  refresh-client -S

# ─── Smart window naming ─────────────────────────────────
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{!=:#{pane_current_command},zsh},#{pane_current_command},#{b:pane_current_path}}'

# ─── Status bar ──────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 140
# Line 1: session, git, windows, system stats
set -g status-left '#[bold] #{=15:session_name} #[default]#(cd "#{pane_current_path}" && git branch --show-current 2>/dev/null | cut -c1-20 | sed "s/^/ /" ) #{?synchronize-panes,#[fg=red]SYNC #[default],}'
set -g status-right '#(~/.config/tmux/scripts/status_right.sh)'

# SSH + remote tmux: C-a s prompts for host, connects and attaches remote tmux
bind s command-prompt -p "SSH + tmux:" "new-window -n 'ssh:%1' 'ssh -t %1 \"tmux attach || tmux new\"'"

# window tabs
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[bold] #I:#W* '
set -g window-status-separator '│'
setw -g window-status-activity-style 'italics'
setw -g window-status-bell-style 'bold,reverse'

# ─── Pane borders ────────────────────────────────────────
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour4
set -g pane-border-lines heavy
set -g pane-border-status off
set -g pane-border-format '#{?pane_active,#[fg=colour4 bold],#[fg=colour238]} #P: #{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}} #{?pane_active,▸ #{pane_tty},}#[default] '
# Show pane labels only when 2+ panes exist
set-hook -g after-split-window 'if -F "#{>:#{window_panes},1}" "setw pane-border-status top"'
set-hook -g after-kill-pane 'if -F "#{<:#{window_panes},2}" "setw pane-border-status off"'
set-hook -g pane-exited 'if -F "#{<:#{window_panes},2}" "setw pane-border-status off"'

# ─── Activity & bells ────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off     # don't spam messages, just highlight in status
set -g visual-bell off
set -g bell-action other       # notify only from other windows

# ─── TPM plugins ─────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'arcticicestudio/nord-tmux'

# ─── Plugin config ───────────────────────────────────────
set -g @nord_tmux_show_status_content "0"
# resurrect/continuum disabled — use C-a C-s / C-a C-r manually if re-enabled
set -g @thumbs-key Space              # C-a Space to pick & copy text hints
set -g @fzf-url-bind 'u'             # C-a u to pick URLs from pane
set -g @logging-path "$HOME/.local/share/tmux/logs"
set -g @screen-capture-path "$HOME/.local/share/tmux/logs"

# ─── Init TPM (keep at bottom) ───────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
# Auto-clone TPM if missing, then load it
if-shell "[ ! -f ~/.config/tmux/plugins/tpm/tpm ]" \
  "run 'mkdir -p ~/.config/tmux/plugins && git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/tpm'" \
  "run '~/.config/tmux/plugins/tpm/tpm'"

# ─── Post-plugin overrides ────────────────────────────
run 'tmux set -g status-interval 5'
